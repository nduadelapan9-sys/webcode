<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>NORI AUDIO</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    padding: 80px;
}

.container {
    width: 300px;
    margin: auto;
}

.form {
    background: skyblue;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input, textarea {
    width: 90%;
    padding: 4px;
    margin: 6px 0;
}

button {
    padding: 10px;
    background: blue;
    color: white;
    border: none;
    cursor: pointer;
}

/* KWITANSI */
.kwitansi {
    position: relative;
    width: 600px;
    padding: 10px;
    background-size: cover;
    background-position: center;
    border: 1px solid #000;
}

.kwitansi img.logo {
    width: 200px;
    margin: 10px;
}

.row {
    display: flex;
    justify-content: space-between;
}

.underline {
    border-bottom: 1px solid #000;
    display: inline-block;
    min-width: 300px;
}

.tanda-tangan {
    margin-top: 50px;
    text-align: right;
}
</style>
</head>

<body>

<div class="container">

<div class="form">
<h3>Nota NR AUDIO</h3>

<input type="file" id="logo">
<input type="file" id="bg">

<input type="text" id="nama" placeholder="Nama">
<input type="text" id="alamat" placeholder="Alamat">
<input type="number" id="rupiah" placeholder="Nominal (Rp)">
<textarea id="keterangan" placeholder="Keterangan"></textarea>

<button onclick="buatKwitansi()">Generate</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>

<div id="kwitansi" class="kwitansi">

<div class="row">
    <img id="logoPreview" class="logo">
    <div>
    <h2>NORI AUDIO(Sound & Lighting)</h2>
    </div>
</div>

<p>Nama : <span id="tNama" class="underline"></span></p>
<p>Alamat : <span id="tAlamat" class="underline"></span></p>
<p>Uang sejumlah : Rp <span id="tRupiah" class="underline"></span></p>
<p>Keterangan/Acara :</p>
<p id="tKeterangan" class="underline"></p>

<div class="tanda-tangan">
    <p>Hormat Kami</p>
    <br><br>
    <p>(NR AUDIO JEMBER)</p>
</div>

</div>

</div>

<!-- LIBRARY PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let bgImage = "";

document.getElementById("bg").addEventListener("change", function(e){
    let file = e.target.files[0];
    let reader = new FileReader();
    reader.onload = function(event){
        bgImage = event.target.result;
        document.getElementById("kwitansi").style.backgroundImage = "url("+bgImage+")";
    }
    reader.readAsDataURL(file);
});

document.getElementById("logo").addEventListener("change", function(e){
    let file = e.target.files[0];
    let reader = new FileReader();
    reader.onload = function(event){
        document.getElementById("logoPreview").src = event.target.result;
    }
    reader.readAsDataURL(file);
});

function buatKwitansi(){
    document.getElementById("tNama").innerText = document.getElementById("nama").value;
    document.getElementById("tAlamat").innerText = document.getElementById("alamat").value;
    document.getElementById("tRupiah").innerText = document.getElementById("rupiah").value;
    document.getElementById("tKeterangan").innerText = document.getElementById("keterangan").value;
}

async function downloadPDF(){
    const { jsPDF } = window.jspdf;

    const el = document.getElementById("kwitansi");

    html2canvas(el).then(canvas => {
        const imgData = canvas.toDataURL("image/png");
        const pdf = new jsPDF("p", "mm", "a4");

        const width = 210;
        const height = (canvas.height * width) / canvas.width;

        pdf.addImage(imgData, "PNG", 0, 0, width, height);
        pdf.save("kwitansi.pdf");
    });
}
</script>

</body>
</html>
