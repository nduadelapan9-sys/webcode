<!DOCTYPE html>
<html>
<head>
<title>Pendaftaran Nory Audio</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{

    font-family:Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:10px;

}

.container{

    width:100%;
    max-width:850px;
    margin:auto;
    background:rgb(212, 224, 218);
    padding:15px;
    box-sizing:border-box;
    border-radius:10px;
    box-shadow:0 0 10px #aaa;

}

h2{
    text-align:center;
}

.menu{
    display:flex;
    gap:10px;
}

.menu button{
    width:50%;
    background:#1ae4da;
    color: rgb(1, 4, 19);
    font-weight: bold;
}

input,
textarea,
select{

    width:100%;
    padding:12px;
    box-sizing:border-box;
    font-size:16px;

}


textarea{
    height:70px;
}


button{

    padding:10px;
    width:100%;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;

}


table{

    width:100%;
    margin-top:20px;
    border-collapse:collapse;

}


th{

background:#007bff;
color:white;

}


th,td{

border:1px solid #ddd;
padding:8px;
text-align:center;

}


#history{
display:none;
}


.hapus{

background:red;

}

.header{

display:flex;
align-items:center;
justify-content:center;
gap:15px;
margin-bottom:20px;

}


.logo{

width:70px;
height:70px;
object-fit:contain;

}


.header h2{

margin:0;

}

@media screen and (max-width:600px){


body{

    font-size:14px;

}


.container{

    width:95%;
    padding:12px;

}



.header{

    flex-direction:column;
    text-align:center;

}


.logo{

    width:60px;
    height:60px;

}



.menu{

    flex-direction:column;

}


.menu button{

    width:100%;

}



input,
textarea,
select,
button{

    font-size:16px;

}



table{

    font-size:12px;

    display:block;
    overflow-x:auto;
    white-space:nowrap;

}



th,td{

    padding:6px;

}



}

@media(max-width:600px){


h2{

    font-size:22px;

}


.logo{

    width:55px;
    height:55px;

}


.menu button{

    font-size:16px;
    padding:14px;

}



button{

    font-size:16px;

}



table{

    width:100%;
    font-size:13px;

}



#history{

    overflow-x:auto;

}



input,
textarea,
select{

    border-radius:8px;

}



}


</style>


</head>


<body>


<div class="container">


<div class="header">

<img src="logo.png" class="logo">

<h2>PENDAFTARAN NORY AUDIO</h2>
<p>[Website by Nr Audio - 087771549723]</p>

</div>


<div class="menu">

<button onclick="showForm()">
Pendaftaran
</button>

<button onclick="loginAdmin()">
History
</button>

</div>



<div id="form">


<form onsubmit="simpanData(event)">


<label>Nama Penyewa</label>
<input type="text" id="nama" required>


<label>Nomor HP</label>
<input type="text" id="hp" required>


<label>Tanggal Acara</label>
<input type="date" id="tanggal" required>


<label>Alamat Acara</label>
<textarea id="alamat" required></textarea>


<label>Keterangan</label>
<textarea id="ket"></textarea>


<label>Pembayaran</label>

<select id="bayar">

<option value="DP">
DP
</option>

<option value="Lunas">
Lunas
</option>

</select>


<label>Nominal Rp</label>

<input 
type="text" 
id="rupiah" 
placeholder="Contoh: 500.000"
oninput="formatRupiah(this)"
required>


<button>
Simpan
</button>


</form>

</div>


<div id="history">


<h3>History</h3>


<table>


<tr>

<th>No</th>
<th>Nama</th>
<th>HP</th>
<th>Tanggal</th>
<th>Alamat</th>
<th>Keterangan</th>
<th>Status</th>
<th>Rp</th>
<th>Aksi</th>

</tr>


<tbody id="tabelHistory">

</tbody>


</table>


</div>


</div>



<script>

const adminUser = "nraudio";
const adminPass = "nory28";

function loginAdmin(){


let user = prompt("Username Admin:");

let pass = prompt("Password Admin:");



if(user === adminUser && pass === adminPass){


    showHistory();


}
else{


    alert("Akses ditolak! Anda bukan Owner Nory Audio");


}


}

function simpanData(e){

e.preventDefault();


let data={


nama:document.getElementById("nama").value,

hp:document.getElementById("hp").value,

tanggal:document.getElementById("tanggal").value,

alamat:document.getElementById("alamat").value,

ket:document.getElementById("ket").value,

bayar:document.getElementById("bayar").value,

rupiah:document.getElementById("rupiah").value.replace(/\./g,'')


};



let history =
JSON.parse(localStorage.getItem("penyewa")) || [];



history.push(data);



localStorage.setItem(
"penyewa",
JSON.stringify(history)
);



alert("Data berhasil disimpan");


document.querySelector("form").reset();


}





function showHistory(){


document.getElementById("form").style.display="none";

document.getElementById("history").style.display="block";


tampilHistory();


}




function showForm(){


document.getElementById("form").style.display="block";

document.getElementById("history").style.display="none";


}

function formatRupiah(input){

    let angka = input.value.replace(/\D/g,'');

    input.value = angka.replace(/\B(?=(\d{3})+(?!\d))/g,'.');

}


function tampilHistory(){


let tabel=document.getElementById("tabelHistory");


tabel.innerHTML="";



let data=
JSON.parse(localStorage.getItem("penyewa")) || [];



data.forEach((item,index)=>{


let row=tabel.insertRow();



row.insertCell(0).innerHTML=index+1;

row.insertCell(1).innerHTML=item.nama;

row.insertCell(2).innerHTML=item.hp;

row.insertCell(3).innerHTML=item.tanggal;

row.insertCell(4).innerHTML=item.alamat;

row.insertCell(5).innerHTML=item.ket;

row.insertCell(6).innerHTML=item.bayar;


row.insertCell(7).innerHTML=
"Rp "+Number(item.rupiah).toLocaleString("id-ID");



row.insertCell(8).innerHTML=

`<button class="hapus" onclick="hapusData(${index})">
Hapus
</button>`;


});


}




function hapusData(index){


let data=
JSON.parse(localStorage.getItem("penyewa"));


data.splice(index,1);



localStorage.setItem(
"penyewa",
JSON.stringify(data)
);



tampilHistory();


}


</script>


</body>
</html>
